<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapter Results – Brother Portal</title>
  <link rel="icon" type="image/x-icon" href="../Images/ThetaTau.png"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/portal.css">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style id="auth-wall">.auth-pending>header,.auth-pending>main,.auth-pending>.portal-container{display:none!important}.auth-spinner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f5f5f5;z-index:9999}.auth-spinner .sp{width:40px;height:40px;border:4px solid #eee;border-top-color:#8B0000;border-radius:50%;animation:authspin .7s linear infinite}@keyframes authspin{to{transform:rotate(360deg)}}</style>
  <style>
    .results-header { text-align: center; margin-bottom: 2rem; }
    .results-header h1 { font-size: 2rem; color: #8B0000; margin-bottom: 0.25rem; }
    .results-header img { height: 64px; width: 64px; object-fit: contain; margin-bottom: 0.75rem; }
    .results-header p { color: #888; }
    .results-section { margin-bottom: 2rem; }
    .results-section h2 {
      font-size: 1.25rem; margin: 0 0 1rem 0; padding-bottom: 0.5rem;
      border-bottom: 3px solid #FFCC33; color: #8B0000;
    }
    .results-grid {
      columns: 2; column-gap: 2rem; font-size: 1.15rem; line-height: 2.2;
    }
    .results-grid .name-item {
      break-inside: avoid; padding: 0.1rem 0.5rem; border-radius: 4px;
    }
    .results-grid .name-pass { color: #1a1a1a; }
    .results-grid .name-fail { color: #c62828; opacity: 0.65; text-decoration: line-through; }
    .count-badge {
      display: inline-block; background: #FFCC33; color: #8B0000; font-weight: 700;
      padding: 0.15rem 0.6rem; border-radius: 12px; font-size: 0.85rem; margin-left: 0.5rem;
    }
    .no-results { text-align: center; color: #999; padding: 3rem; }
    .leaderboard-chapter { width: 100%; border-collapse: collapse; font-size: 1rem; margin-bottom: 1rem; }
    .leaderboard-chapter th, .leaderboard-chapter td { padding: 0.4rem 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
    .leaderboard-chapter th { background: #f5f5f5; font-weight: 600; }
    .regular-poll-card { background: #f8f9fa; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .regular-poll-card h4 { margin: 0 0 0.5rem; }
    .option-counts-row { display: flex; gap: 1.25rem; flex-wrap: wrap; font-size: 1rem; }
    .option-counts-row span { font-weight: 600; }
    .summary-info {
      background: #f8f9fa; padding: 0.6rem 1rem; border-radius: 8px; margin-bottom: 1rem;
      font-size: 0.95rem; color: #555;
    }
    @media (max-width: 600px) {
      .results-grid { columns: 1; }
    }
    @media print {
      header, .btn { display: none !important; }
      .results-grid { font-size: 1rem; }
    }
  </style>
</head>
<body class="auth-pending">
  <div class="auth-spinner" id="auth-spinner"><div class="sp"></div></div>
  <header class="portal-header">
    <div class="header-brand"><a href="/portal" class="logo-link"><img src="../Images/ThetaTau.png" alt="ΘΤ"></a><h1>Chapter Results</h1></div>
    <div class="user-info">
      <div class="nav-dropdown" id="nav-dropdown">
        <button type="button" class="nav-dropdown-toggle" id="dd-toggle"><span id="user-name">Menu</span></button>
        <div class="nav-dropdown-menu" id="dd-menu">
          <a href="/portal">Portal home</a>
          <a href="voting">Voting</a>
          <a href="regent" id="link-regent" class="hidden">Regent view</a>
          <a href="standards" id="link-standards" class="hidden">Standards</a>
          <a href="history" id="link-history" class="hidden">Session History</a>
          <a href="admin" id="link-admin" class="hidden">Admin</a>
          <a href="timer" id="link-timer" class="hidden">Event Timer</a>
          <div class="dd-divider"></div>
          <button type="button" class="dd-signout" id="btn-signout">Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="portal-container">
    <div id="loading" class="portal-card" style="text-align:center; color:#999;">Loading results...</div>
    <div id="results-content" class="hidden">
      <div class="results-header">
        <img src="../Images/ThetaTau.png" alt="Theta Tau">
        <h1 id="session-title">Chapter Results</h1>
        <p id="session-date"></p>
      </div>
      <div id="results-sections"></div>
      <div style="text-align:center; margin-top:2rem;">
        <a href="/portal" class="btn btn-primary" style="padding:0.5rem 1.5rem;">Back to Portal</a>
      </div>
    </div>
    <div id="no-data" class="portal-card no-results hidden">No session data found.</div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script>
  (function() {
    'use strict';
    var db = firebase.database();

    function getParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    function formatDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function isYesNoPoll(poll) {
      var agg = poll.aggregation || {};
      var oc = agg.optionCounts || {};
      var keys = Object.keys(oc).map(function(k) { return k.toLowerCase(); });
      return keys.indexOf('yes') !== -1 && keys.indexOf('no') !== -1;
    }

    function getYesNoFromRegular(agg) {
      var oc = agg.optionCounts || {};
      var yes = 0, no = 0;
      Object.keys(oc).forEach(function(k) {
        var lk = k.toLowerCase();
        if (lk === 'yes') yes = oc[k];
        else if (lk === 'no') no = oc[k];
      });
      return { yes: yes, no: no };
    }

    function buildYesNoSection(polls, threshold, container) {
      var rows = [];
      polls.forEach(function(item) {
        var agg = item.poll.aggregation || {};
        var yes, no;
        if (item.poll.type === 'regular') {
          var parsed = getYesNoFromRegular(agg);
          yes = parsed.yes; no = parsed.no;
        } else {
          yes = agg.yes || 0; no = agg.no || 0;
        }
        var total = yes + no;
        var pct = total ? Math.round(100 * yes / total) : 0;
        rows.push({ name: item.poll.name, pct: pct, pass: pct >= threshold });
      });
      rows.sort(function(a, b) { return b.pct - a.pct; });

      var passCount = rows.filter(function(r) { return r.pass; }).length;
      var failCount = rows.length - passCount;

      var section = document.createElement('div');
      section.className = 'results-section';

      var heading = document.createElement('h2');
      heading.textContent = 'Vote Results';
      section.appendChild(heading);

      var info = document.createElement('div');
      info.className = 'summary-info';
      info.innerHTML = 'Threshold: <strong>' + threshold + '%</strong> &nbsp;·&nbsp; ' +
        'Passed: <span class="count-badge">' + passCount + '</span> &nbsp; ' +
        'Did not pass: <span class="count-badge" style="background:#c62828; color:#fff;">' + failCount + '</span>';
      section.appendChild(info);

      var grid = document.createElement('div');
      grid.className = 'results-grid';
      rows.forEach(function(r) {
        var div = document.createElement('div');
        div.className = 'name-item ' + (r.pass ? 'name-pass' : 'name-fail');
        div.textContent = r.name;
        grid.appendChild(div);
      });
      section.appendChild(grid);
      container.appendChild(section);
    }

    function buildRankedSection(polls, rminParams, container) {
      polls.forEach(function(item) {
        var poll = item.poll;
        var agg = poll.aggregation || {};
        var cs = agg.candidateScores || {};
        var minScore = rminParams[item.pid] != null ? rminParams[item.pid] : (poll.minimumScore || 0);

        var sorted = Object.keys(cs).map(function(name) {
          return { name: name, score: cs[name].total || 0 };
        }).sort(function(a, b) { return b.score - a.score; });

        var passCount = sorted.filter(function(c) { return c.score >= minScore; }).length;
        var failCount = sorted.length - passCount;

        var section = document.createElement('div');
        section.className = 'results-section';

        var heading = document.createElement('h2');
        heading.textContent = poll.name || 'Ranked Scorecard';
        section.appendChild(heading);

        var info = document.createElement('div');
        info.className = 'summary-info';
        info.innerHTML = sorted.length + ' candidates · ' + (agg.totalVoters || 0) + ' voters · min score: <strong>' + minScore + '</strong> &nbsp;·&nbsp; ' +
          'Passed: <span style="color:#2e7d32; font-weight:600;">' + passCount + '</span> · ' +
          'Did not pass: <span style="color:#c62828; font-weight:600;">' + failCount + '</span>';
        section.appendChild(info);

        var table = document.createElement('table');
        table.className = 'leaderboard-chapter';
        table.innerHTML = '<thead><tr><th>#</th><th>Name</th><th>Score</th><th>Status</th></tr></thead>';
        var tbody = document.createElement('tbody');
        sorted.forEach(function(c, i) {
          var passes = c.score >= minScore;
          var tr = document.createElement('tr');
          tr.innerHTML = '<td>' + (i + 1) + '</td><td>' + c.name + '</td><td>' + c.score + '</td>' +
            '<td style="color:' + (passes ? '#2e7d32' : '#c62828') + '; font-weight:600;">' + (passes ? 'PASS' : 'Below cutoff') + '</td>';
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        section.appendChild(table);
        container.appendChild(section);
      });
    }

    function buildRegularSection(polls, container) {
      var section = document.createElement('div');
      section.className = 'results-section';

      var heading = document.createElement('h2');
      heading.textContent = 'Vote Results';
      section.appendChild(heading);

      polls.forEach(function(item) {
        var poll = item.poll;
        var agg = poll.aggregation || {};
        var oc = agg.optionCounts || {};
        var totalVoters = agg.totalVoters || 0;

        var card = document.createElement('div');
        card.className = 'regular-poll-card';

        var h4 = document.createElement('h4');
        h4.textContent = poll.name || '(unnamed)';
        card.appendChild(h4);

        var countsRow = document.createElement('div');
        countsRow.className = 'option-counts-row';
        Object.keys(oc).forEach(function(opt) {
          var span = document.createElement('span');
          span.textContent = opt + ': ' + oc[opt];
          countsRow.appendChild(span);
        });
        card.appendChild(countsRow);

        var voters = document.createElement('p');
        voters.style.cssText = 'font-size:0.85rem; color:#888; margin:0.25rem 0 0;';
        voters.textContent = totalVoters + ' voters';
        card.appendChild(voters);

        section.appendChild(card);
      });

      container.appendChild(section);
    }

    function renderResults(s, sid) {
      document.getElementById('loading').classList.add('hidden');
      if (!s || !s.polls) {
        document.getElementById('no-data').classList.remove('hidden');
        return;
      }

      var content = document.getElementById('results-content');
      content.classList.remove('hidden');

      document.getElementById('session-title').textContent = 'Chapter Results';
      document.getElementById('session-date').textContent = formatDate(s.endedAt);

      var threshold = parseInt(getParam('thresh'), 10);
      if (isNaN(threshold)) threshold = 75;

      var rminParams = {};
      var url = new URL(window.location.href);
      url.searchParams.forEach(function(val, key) {
        if (key.indexOf('rmin_') === 0) {
          rminParams[key.substring(5)] = parseInt(val, 10) || 0;
        }
      });

      var polls = s.polls || {};
      var rankedPolls = [], regularPolls = [], yesNoPolls = [];
      Object.keys(polls).forEach(function(pid) {
        var p = polls[pid];
        if (p.type === 'ranked' || p.type === 'rush_prelim') rankedPolls.push({ pid: pid, poll: p });
        else if (p.type === 'regular') {
          if (isYesNoPoll(p)) {
            yesNoPolls.push({ pid: pid, poll: p });
          } else {
            regularPolls.push({ pid: pid, poll: p });
          }
        }
        else if (p.type === 'rush_bid' || p.type === 'pnm_vote' || p.type === 'motion') yesNoPolls.push({ pid: pid, poll: p });
      });

      var sections = document.getElementById('results-sections');
      sections.innerHTML = '';
      var hasContent = false;

      if (rankedPolls.length > 0) {
        buildRankedSection(rankedPolls, rminParams, sections);
        hasContent = true;
      }
      if (yesNoPolls.length > 0) {
        buildYesNoSection(yesNoPolls, threshold, sections);
        hasContent = true;
      }
      if (regularPolls.length > 0) {
        buildRegularSection(regularPolls, sections);
        hasContent = true;
      }

      if (!hasContent) {
        sections.innerHTML = '<div class="no-results">No displayable polls in this session.</div>';
      }
    }

    function init() {
      PortalAuth.requireAuth({ redirect: true }).then(function(profile) {
        if (!profile || profile.role === 'pending') return;
        PortalAuth.initNav(profile);

        var sid = getParam('sid');
        if (!sid) {
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('no-data').classList.remove('hidden');
          return;
        }

        db.ref('sessionHistory/' + sid).once('value').then(function(snap) {
          renderResults(snap.val(), sid);
        }).catch(function(err) {
          document.getElementById('loading').textContent = 'Error: ' + err.message;
        });
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
