<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Session History – Brother Portal</title>
  <link rel="icon" type="image/x-icon" href="../Images/ThetaTau.png"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/portal.css">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style id="auth-wall">.auth-pending>header,.auth-pending>main,.auth-pending>.portal-container{display:none!important}.auth-spinner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f5f5f5;z-index:9999}.auth-spinner .sp{width:40px;height:40px;border:4px solid #eee;border-top-color:#8B0000;border-radius:50%;animation:authspin .7s linear infinite}@keyframes authspin{to{transform:rotate(360deg)}}</style>
  <style>
    .session-card { cursor: pointer; transition: border-color 0.2s; }
    .session-card:hover { border-color: #FFCC33; }
    .session-card.expanded { border-color: #FFCC33; }
    .session-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; color: #888; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .poll-result-card { background: #f8f9fa; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .poll-result-card h4 { margin: 0 0 0.25rem 0; }
    .poll-result-card .result-line { font-weight: 600; margin: 0.25rem 0 0.5rem 0; color: #444; }
    .whatif-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px dashed #ddd; font-size: 0.85rem; }
    .whatif-row label { font-weight: 500; }
    .whatif-row input { width: 65px; padding: 0.2rem 0.4rem; border: 1px solid #ccc; border-radius: 4px; }
    .leaderboard-mini { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 0.5rem; }
    .leaderboard-mini th, .leaderboard-mini td { padding: 0.25rem 0.5rem; text-align: left; border-bottom: 1px solid #eee; }
    .leaderboard-mini th { background: #eee; font-weight: 600; }
    .voter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.25rem 1rem; font-size: 0.9rem; }
    .voter-grid span { padding: 0.15rem 0; }
    .session-polls { display: none; margin-top: 1rem; }
    .session-card.expanded .session-polls { display: block; }
    .no-history { color: #999; text-align: center; padding: 3rem; }
    .export-btn { font-size: 0.85rem; padding: 0.3rem 0.75rem; margin-left: 0.5rem; }
    .delete-btn { font-size: 0.85rem; padding: 0.3rem 0.75rem; margin-left: 0.5rem; background: #c62828; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .delete-btn:hover { background: #a01010; }
    .summary-card { background: #f0f4ff; border: 2px solid #FFCC33; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
    .summary-card h3 { margin: 0 0 0.75rem 0; color: #8B0000; }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .summary-table th, .summary-table td { padding: 0.35rem 0.6rem; text-align: left; border-bottom: 1px solid #ddd; }
    .summary-table th { background: #e8eaf6; font-weight: 600; }
  </style>
</head>
<body class="auth-pending">
  <div class="auth-spinner" id="auth-spinner"><div class="sp"></div></div>
  <header class="portal-header">
    <div class="header-brand"><a href="/portal" class="logo-link"><img src="../Images/ThetaTau.png" alt="ΘΤ"></a><h1>Session History</h1></div>
    <div class="user-info">
      <div class="nav-dropdown" id="nav-dropdown">
        <button type="button" class="nav-dropdown-toggle" id="dd-toggle"><span id="user-name">Menu</span></button>
        <div class="nav-dropdown-menu" id="dd-menu">
          <a href="/portal">Portal home</a>
          <a href="voting">Voting</a>
          <a href="regent" id="link-regent" class="hidden">Regent view</a>
          <a href="standards" id="link-standards" class="hidden">Standards</a>
          <a href="history" id="link-history" class="hidden">Session History</a>
          <a href="admin" id="link-admin" class="hidden">Admin</a>
          <a href="timer" id="link-timer" class="hidden">Event Timer</a>
          <div class="dd-divider"></div>
          <button type="button" class="dd-signout" id="btn-signout">Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="portal-container">
    <div id="history-list"></div>
    <div id="loading" class="portal-card" style="text-align:center; color:#999;">Loading sessions...</div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script>
  (function() {
    'use strict';
    var db = firebase.database();

    var TYPE_LABELS = {
      rush_prelim:  'Rush Prelim',
      rush_bid:     'Rush Bid',
      motion:       'Motion',
      pnm_vote:     'PNM Vote',
      pnm_depledge: 'PNM De-pledge',
      ranked:       'Ranked Scorecard',
      regular:      'Regular Vote'
    };

    function typeLabel(t) { return TYPE_LABELS[t] || t || ''; }

    // Returns true if a 'regular' poll aggregation has yes/no data
    function regularIsYesNo(agg) {
      var oc = agg.optionCounts || {};
      var keys = Object.keys(oc).map(function(k) { return k.toLowerCase(); });
      return keys.indexOf('yes') !== -1 && keys.indexOf('no') !== -1;
    }

    // Extracts yes/no/abstain counts from a 'regular' poll's optionCounts
    function yesNoFromRegular(agg) {
      var oc = agg.optionCounts || {};
      var yes = 0, no = 0, abstain = 0;
      Object.keys(oc).forEach(function(k) {
        var l = k.toLowerCase();
        if (l === 'yes') yes = oc[k];
        else if (l === 'no') no = oc[k];
        else abstain += oc[k];
      });
      return { yes: yes, no: no, abstain: abstain };
    }

    function formatDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
    }

    // Returns yes% as integer, excluding abstains. Handles yes/no/abstain types
    // and 'regular' polls that have yes/no option counts.
    function yesPct(agg, pollType) {
      var yes, no;
      if (pollType === 'regular') {
        var yn = yesNoFromRegular(agg);
        yes = yn.yes; no = yn.no;
      } else {
        yes = agg.yes || 0; no = agg.no || 0;
      }
      var total = yes + no;
      return total ? Math.round(100 * yes / total) : 0;
    }

    // Builds ranked leaderboard sorted by score descending
    function buildLeaderboard(agg, minScore) {
      var cs = agg.candidateScores || {};
      return Object.keys(cs).map(function(name) {
        return { name: name, score: cs[name].total || 0 };
      }).sort(function(a, b) { return b.score - a.score; }).map(function(c, i) {
        return { rank: i + 1, name: c.name, score: c.score, passes: c.score >= minScore };
      });
    }

    function renderLeaderboardTable(board) {
      var html = '<table class="leaderboard-mini"><thead><tr><th>#</th><th>Name</th><th>Score</th></tr></thead><tbody>';
      board.forEach(function(c) {
        html += '<tr><td>' + c.rank + '</td><td>' + c.name + '</td><td>' + c.score + '</td></tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    function renderPollCard(pid, p, uniqueId) {
      var agg = p.aggregation || {};
      var voters = p.voters || {};
      var voterKeys = Object.keys(voters);
      var type = p.type || '';

      var html = '<div class="poll-result-card" id="poll-' + uniqueId + '">';
      html += '<h4>' + (p.name || '(unnamed)') +
        ' <span style="color:#888; font-weight:400; font-size:0.85rem;">(' + typeLabel(type) + ')</span></h4>';

      if (type === 'rush_prelim' || type === 'ranked') {
        var minScore = p.minimumScore || 0;
        var board = buildLeaderboard(agg, minScore);
        html += '<p style="font-size:0.9rem; margin:0 0 0.5rem;">' +
          board.length + ' candidates · ' + (agg.totalVoters || 0) + ' voters</p>';
        html += renderLeaderboardTable(board);
        html += '<div class="whatif-row">';
        html += '<label>What-if min score:</label>' +
          '<input type="number" value="' + minScore + '" class="whatif-prelim-min" data-uid="' + uniqueId + '">';
        html += '<button type="button" class="btn btn-primary" style="padding:0.2rem 0.6rem; font-size:0.8rem;"' +
          ' data-uid="' + uniqueId + '" data-pid="' + pid + '">Recalculate</button>';
        html += '</div>';

      } else if (type === 'rush_bid' || type === 'motion' || type === 'pnm_vote') {
        var pct = yesPct(agg, type);
        html += '<p class="result-line">' + pct + '% yes</p>';
        html += '<p style="font-size:0.9rem; margin:0 0 0.5rem;">Yes: ' + (agg.yes || 0) +
          ' · No: ' + (agg.no || 0) + ' · Abstain: ' + (agg.abstain || 0) + '</p>';

      } else if (type === 'pnm_depledge') {
        var dpct = yesPct(agg, type);
        html += '<p class="result-line">' + dpct + '% voted yes to de-pledge</p>';
        html += '<p style="font-size:0.9rem; margin:0 0 0.5rem;">Yes: ' + (agg.yes || 0) +
          ' · No: ' + (agg.no || 0) + '</p>';

      } else if (type === 'regular') {
        if (regularIsYesNo(agg)) {
          var yn = yesNoFromRegular(agg);
          var rpct = yesPct(agg, 'regular');
          html += '<p class="result-line">' + rpct + '% yes</p>';
          html += '<p style="font-size:0.9rem; margin:0 0 0.5rem;">Yes: ' + yn.yes +
            ' · No: ' + yn.no + (yn.abstain ? ' · Other: ' + yn.abstain : '') + '</p>';
        } else {
          var oc = agg.optionCounts || {};
          html += '<p style="font-size:0.9rem; margin:0 0 0.5rem;">';
          html += Object.keys(oc).map(function(k) { return k + ': <strong>' + oc[k] + '</strong>'; }).join(' · ');
          html += '</p>';
        }

      } else {
        if (p.result) html += '<p class="result-line">' + p.result + '</p>';
      }

      // Voter breakdown for all non-prelim types
      if (type !== 'rush_prelim') {
        if (voterKeys.length > 0) {
          html += '<div class="voter-grid">';
          voterKeys.forEach(function(uid) {
            var v = voters[uid].vote;
            html += '<span><strong>' + voters[uid].name + '</strong>: ' +
              (typeof v === 'object' ? JSON.stringify(v) : v) + '</span>';
          });
          html += '</div>';
        } else {
          html += '<p style="color:#999; font-size:0.9rem;">No votes recorded.</p>';
        }
      }

      html += '</div>';
      return html;
    }

    // Builds summary rows sorted by yes% descending. Handles all yes/no variants.
    function computeYesNoSummary(polls) {
      return polls.map(function(item) {
        var agg = item.poll.aggregation || {};
        var t = item.poll.type;
        var pct = yesPct(agg, t);
        var yes, no, abstain;
        if (t === 'regular') {
          var yn = yesNoFromRegular(agg);
          yes = yn.yes; no = yn.no; abstain = yn.abstain;
        } else {
          yes = agg.yes || 0; no = agg.no || 0; abstain = agg.abstain || 0;
        }
        return { name: item.poll.name, type: typeLabel(t), pct: pct, yes: yes, no: no, abstain: abstain };
      }).sort(function(a, b) { return b.pct - a.pct; });
    }

    function renderSummaryTable(rows) {
      var html = '<table class="summary-table">';
      html += '<thead><tr><th>Name</th><th>Type</th><th>Yes %</th><th>Yes</th><th>No</th><th>Abstain</th></tr></thead><tbody>';
      rows.forEach(function(r) {
        html += '<tr><td>' + r.name + '</td><td>' + r.type + '</td><td>' + r.pct + '%</td>' +
          '<td>' + r.yes + '</td><td>' + r.no + '</td><td>' + r.abstain + '</td></tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    function renderYesNoSummaryCard(polls, sid) {
      var rows = computeYesNoSummary(polls);
      var uid = sid + '-summary-yesno';
      var html = '<div class="summary-card" id="summary-' + uid + '">';
      html += '<h3>Yes/No Vote Summary (' + rows.length + ' polls)</h3>';
      html += renderSummaryTable(rows);
      html += '</div>';
      return html;
    }

    var sessionDataCache = {};

    function renderSession(sid, s) {
      sessionDataCache[sid] = s;
      var polls = s.polls || {};
      var pollIds = Object.keys(polls);
      var card = document.createElement('div');
      card.className = 'portal-card session-card';

      var header = '<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">';
      header += '<h3 style="margin:0;">Session: ' + (s.accessCode || sid.substring(0, 8)) + '</h3>';
      header += '<div>';
      header += '<button type="button" class="btn btn-primary chapter-view-btn" data-sid="' + sid + '"' +
        ' style="font-size:0.85rem; padding:0.3rem 0.75rem; margin-right:0.35rem;">Show Chapter</button>';
      header += '<button class="btn btn-primary export-btn" data-sid="' + sid + '">Export Excel</button>';
      header += '<button class="delete-btn" data-sid="' + sid + '">Delete</button>';
      header += '</div></div>';
      header += '<div class="session-meta">';
      header += '<span>Ended: ' + formatDate(s.endedAt) + '</span>';
      header += '<span>Polls: ' + pollIds.length + '</span>';
      header += '</div>';
      header += '<p style="font-size:0.85rem; color:#aaa; margin:0;">Click to expand</p>';

      // Collect all yes/no type polls for the summary card
      var yesNoPolls = pollIds
        .map(function(pid) { return { pid: pid, poll: polls[pid] }; })
        .filter(function(item) {
          var t = item.poll.type;
          if (t === 'rush_bid' || t === 'pnm_vote' || t === 'motion' || t === 'pnm_depledge') return true;
          if (t === 'regular') return regularIsYesNo(item.poll.aggregation || {});
          return false;
        });

      var pollsHtml = '<div class="session-polls">';
      if (yesNoPolls.length > 0) pollsHtml += renderYesNoSummaryCard(yesNoPolls, sid);
      pollIds.forEach(function(pid, i) {
        pollsHtml += renderPollCard(pid, polls[pid], sid + '-' + i);
      });
      pollsHtml += '</div>';

      card.innerHTML = header + pollsHtml;

      card.addEventListener('click', function(e) {
        if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' ||
            e.target.tagName === 'A' || e.target.closest('a')) return;
        card.classList.toggle('expanded');
      });

      card.querySelector('.chapter-view-btn').addEventListener('click', function() {
        var params = 'sid=' + encodeURIComponent(sid);
        var minInputs = card.querySelectorAll('.whatif-prelim-min');
        minInputs.forEach(function(inp) {
          var uid = inp.getAttribute('data-uid');
          var parts = uid.split('-');
          var idx = parseInt(parts[parts.length - 1], 10);
          var pids = Object.keys((sessionDataCache[sid] || {}).polls || {});
          if (pids[idx]) params += '&rmin_' + pids[idx] + '=' + (parseInt(inp.value, 10) || 0);
        });
        window.open('chapter-results?' + params, '_blank');
      });

      card.querySelector('.export-btn').addEventListener('click', function() {
        exportSessionExcel(s, sid);
      });
      card.querySelector('.delete-btn').addEventListener('click', function() {
        deleteSession(sid, s.accessCode, card);
      });

      // What-if: rush_prelim / ranked min-score recalculate
      card.querySelectorAll('.whatif-row button[data-pid]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var uid = this.getAttribute('data-uid');
          var minInput = card.querySelector('.whatif-prelim-min[data-uid="' + uid + '"]');
          if (!minInput) return;
          var min = parseInt(minInput.value, 10) || 0;
          var parts = uid.split('-');
          var sesId = parts.slice(0, -1).join('-');
          var idx = parseInt(parts[parts.length - 1], 10);
          var sesData = sessionDataCache[sesId];
          if (!sesData) return;
          var pids = Object.keys(sesData.polls || {});
          var p = (sesData.polls || {})[pids[idx]];
          if (!p || !p.aggregation) return;
          var board = buildLeaderboard(p.aggregation, min);
          var container = document.getElementById('poll-' + uid);
          var existing = container.querySelector('.leaderboard-mini');
          if (existing) existing.outerHTML = renderLeaderboardTable(board);
        });
      });

      return card;
    }

    function exportSessionExcel(s, sid) {
      if (typeof XLSX === 'undefined') { alert('SheetJS not loaded.'); return; }
      var polls = s.polls || {};
      var pollIds = Object.keys(polls);
      var wb = XLSX.utils.book_new();

      var overviewRows = [['Poll', 'Type', 'Yes', 'No', 'Abstain', 'Yes %']];
      var pollSheets = [];

      pollIds.forEach(function(pid, i) {
        var p = polls[pid];
        var agg = p.aggregation || {};
        var voters = p.voters || {};
        var voterKeys = Object.keys(voters);
        var isRanked = p.type === 'rush_prelim' || p.type === 'ranked';

        // ── Overview row ──
        if (isRanked) {
          overviewRows.push([p.name || '', typeLabel(p.type), '—', '—', '—', 'Ranked (see tab)']);
        } else if (p.type === 'regular' && !regularIsYesNo(agg)) {
          var oc = agg.optionCounts || {};
          var breakdown = Object.keys(oc).map(function(k) { return k + ': ' + oc[k]; }).join(', ');
          overviewRows.push([p.name || '', typeLabel(p.type), breakdown, '', '', '—']);
        } else {
          var yn = (p.type === 'regular') ? yesNoFromRegular(agg)
            : { yes: agg.yes || 0, no: agg.no || 0, abstain: agg.abstain || 0 };
          var abstainCell = (p.type === 'pnm_depledge') ? '—' : yn.abstain;
          overviewRows.push([
            p.name || '', typeLabel(p.type),
            yn.yes, yn.no, abstainCell,
            yesPct(agg, p.type) + '%'
          ]);
        }

        // ── Individual poll sheet ──
        var pollRows;
        if (isRanked) {
          var board = buildLeaderboard(agg, p.minimumScore || 0);
          pollRows = [['Poll: ' + (p.name || '')], ['Type: ' + typeLabel(p.type)], [],
            ['Rank', 'Name', 'Score']];
          board.forEach(function(c) { pollRows.push([c.rank, c.name, c.score]); });
        } else {
          pollRows = [['Poll: ' + (p.name || '')], ['Type: ' + typeLabel(p.type)], [],
            ['Brother', 'Vote']];
          voterKeys.forEach(function(uid) {
            var v = voters[uid].vote;
            pollRows.push([voters[uid].name, typeof v === 'object' ? JSON.stringify(v) : v]);
          });
        }
        pollSheets.push({
          name: (i + 1) + '. ' + (p.name || 'Poll').substring(0, 25),
          rows: pollRows
        });
      });

      // Overview goes first, individual tabs follow
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(overviewRows), 'Overview');
      pollSheets.forEach(function(sheet) {
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheet.rows), sheet.name);
      });

      XLSX.writeFile(wb, 'session_' + (s.accessCode || sid.substring(0, 8)) + '.xlsx');
    }

    function deleteSession(sid, code, cardEl) {
      if (!confirm('Delete this session and all its data? This cannot be undone.')) return;
      var updates = {};
      updates['sessionHistory/' + sid] = null;
      updates['sessions/' + sid] = null;
      db.ref().update(updates).then(function() {
        cardEl.remove();
        delete sessionDataCache[sid];
        var container = document.getElementById('history-list');
        if (!container.children.length) {
          container.innerHTML = '<div class="no-history portal-card">No session history yet. Sessions are saved here when Standards ends them.</div>';
        }
      }).catch(function(err) { alert('Failed to delete: ' + err.message); });
    }

    function init() {
      PortalAuth.requireAdmin().then(function(profile) {
        if (!profile) return;
        PortalAuth.initNav(profile);
        db.ref('sessionHistory').orderByChild('endedAt').once('value', function(snap) {
          document.getElementById('loading').classList.add('hidden');
          var data = snap.val();
          if (!data) {
            document.getElementById('history-list').innerHTML =
              '<div class="no-history portal-card">No session history yet. Sessions are saved here when Standards ends them.</div>';
            return;
          }
          var sids = Object.keys(data).sort(function(a, b) {
            return (data[a].endedAt || 0) > (data[b].endedAt || 0) ? -1 : 1;
          });
          var container = document.getElementById('history-list');
          sids.forEach(function(sid) { container.appendChild(renderSession(sid, data[sid])); });
        });
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
