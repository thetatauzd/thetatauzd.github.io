<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin – Approve brothers & roles</title>
  <link rel="icon" type="image/x-icon" href="../Images/ThetaTau.png"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>
  <header class="portal-header">
    <h1>Admin – User management</h1>
    <div class="user-info">
      <div class="nav-dropdown" id="nav-dropdown">
        <button type="button" class="nav-dropdown-toggle" id="dd-toggle"><span id="user-name">Menu</span></button>
        <div class="nav-dropdown-menu" id="dd-menu">
          <a href="index.html">Portal home</a>
          <a href="voting.html">Voting</a>
          <a href="regent.html" id="link-regent" class="hidden">Regent view</a>
          <a href="standards.html" id="link-standards" class="hidden">Standards</a>
          <a href="history.html" id="link-history" class="hidden">Session History</a>
          <a href="admin.html" id="link-admin" class="hidden">Admin</a>
          <div class="dd-divider"></div>
          <button type="button" class="dd-signout" id="btn-signout">Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="portal-container">
    <div class="portal-card">
      <h2>Users</h2>
      <p>Approve pending registrations and set roles. First admin: set your own role to "admin" in Firebase Realtime Database → users → your UID.</p>
      <table class="admin-table" id="admin-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Roll #</th>
            <th>Role</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="admin-tbody"></tbody>
      </table>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
